# ── Netlify Configuration ──────────────────────────────────────
# GQ Analytics static site

[build]
  publish = "."          # root folder is the published site
  # No build command needed — pure static HTML/CSS/JS

# ── Redirect: old PHP URL → new HTML (in case of bookmarks) ──
[[redirects]]
  from   = "/index.php"
  to     = "/index.html"
  status = 301

[[redirects]]
  from   = "/contact.php"
  to     = "/#contact"
  status = 301

# ── Security headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets ───────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
